 <!DOCTYPE html>
<html>
<head>
<title>Student Skill Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #e3f2fd, #ffffff);
    text-align: center;
}

h1 {
    margin-top: 20px;
}

input, select, button {
    padding: 8px;
    margin: 5px;
    height: auto;
}

table {
    width: 90%;
    margin: auto;
    border-collapse: collapse;
    margin-top: 20px;
    background: white;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
}

.beginner {
    background-color: #ffdddd;
}

button {
    cursor: pointer;
}

canvas {
    max-width: 90%;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>📊 Student Skill Dashboard</h1>
<h3 id="total"></h3>
<input type="text" id="name" placeholder="Enter Name">

<select id="section">
    <option>A</option>
    <option>B</option>
</select>

<select id="skill">
    <option>Beginner</option>
    <option>Intermediate</option>
    <option>Advanced</option>
</select>

<button onclick="addStudent()">Add</button>
<button onclick="downloadCSV()">Download Excel</button>
<input type="text" id="search" placeholder="Search..." onkeyup="searchData()">    
<table id="table">
<tr>
<th>Name</th>
<th>Section</th>
<th>Skill</th>
<th>Action</th>
</tr>
</table>

<canvas id="chart" width="300"></canvas>
<canvas id="barChart" width="300"></canvas>
<canvas id="sectionChart" width="300"></canvas>
<script>
let data = JSON.parse(localStorage.getItem("students")) || [];

function saveData() {
    localStorage.setItem("students", JSON.stringify(data));
}

function addStudent() {
    let name = document.getElementById("name").value;
    let section = document.getElementById("section").value;
    let skill = document.getElementById("skill").value;

    if (name === "") {
        alert("Enter name");
        return;
    }

    data.push({ name, section, skill });

    saveData();
    render();
}
function deleteStudent(index) {
    data.splice(index,1);
    saveData();
    render();
}

function editStudent(index) {
    let student = data[index];

    document.getElementById("name").value = student.name;
    document.getElementById("section").value = student.section;
    document.getElementById("skill").value = student.skill;

    data.splice(index, 1);
    saveData();
    render();
}

function renderTable() {
    let table = document.getElementById("table");

    table.innerHTML = `
    <tr>
        <th>Name</th>
        <th>Section</th>
        <th>Skill</th>
        <th>Action</th>
    </tr>`;

    data.forEach((d,i) => {
        let row = table.insertRow();

        if(d.skill === "Beginner") row.classList.add("beginner");

        row.insertCell(0).innerText = d.name;
        row.insertCell(1).innerText = d.section;
        row.insertCell(2).innerText = d.skill;
        let editBtn = document.createElement("button");
editBtn.innerText = "Edit";
editBtn.onclick = () => editStudent(i);

let delBtn = document.createElement("button");
delBtn.innerText = "Delete";
delBtn.onclick = () => deleteStudent(i);

let actionCell = row.insertCell(3);
actionCell.appendChild(editBtn);
actionCell.appendChild(delBtn);
    });
}

let chart;

function renderChart() {

    let b = data.filter(x => x.skill === "Beginner").length;
    let i = data.filter(x => x.skill === "Intermediate").length;
    let a = data.filter(x => x.skill === "Advanced").length;

    // PIE CHART
    if (chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
    type: "pie",
    data: {
        labels: ["Beginner", "Intermediate", "Advanced"],
        datasets: [{
            data: [b, i, a],
            backgroundColor: ["red", "orange", "green"]
        }]
    },
    options: {
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return context.label + ": " + context.raw;
                    }
                }
            }
        }
    }
});
    // BAR CHART
    new Chart(document.getElementById("barChart"), {
        type: "bar",
        data: {
            labels: ["Beginner", "Intermediate", "Advanced"],
            datasets: [{
                label: "Students",
                data: [b, i, a],
                backgroundColor: ["red", "orange", "green"]
            }]
        }
    });
}
function renderSectionChart() {
    let a = data.filter(x => x.section === "A").length;
    let b = data.filter(x => x.section === "B").length;

    new Chart(document.getElementById("sectionChart"), {
        type: "bar",
        data: {
            labels: ["Section A", "Section B"],
            datasets: [{
                label: "Students",
                data: [a, b],
                backgroundColor: ["blue", "purple"]
            }]
        }
    });
}
function render() {
    renderTable();
    renderChart();
    renderSectionChart();
    document.getElementById("total").innerText =
        "Total Students: " + data.length;
}

function downloadCSV() {
    let csv = "Name,Section,Skill\n";

    data.forEach(d => {
        csv += `${d.name},${d.section},${d.skill}\n`;
    });

    let blob = new Blob([csv], { type: 'text/csv' });
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "students.csv";
    a.click();
}

function searchData() {
    let value = document.getElementById("search").value.toLowerCase();
    let rows = document.querySelectorAll("#table tr");

    rows.forEach((row, index) => {
        if (index === 0) return;

        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(value) ? "" : "none";
    });
}

render();
</script>

</body>
</html>
